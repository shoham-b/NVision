exclude: |
  (?x)^(
    \.hypothesis/|
    htmlcov/|
    artifacts/|
    build/|
    dist/|
    \.venv/|
    \.mypy_cache/|
    \.idea/|
    \.pytest_cache/|
    uv\.lock|
    coverage\.xml|
    \.coverage.*|
    .*\.pyc
  )$
fail_fast: true
repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format