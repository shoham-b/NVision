name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~\AppData\Local\uv\Cache
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
      - name: Install dependencies
        run: |
          uv sync --group dev
      - name: Pre-commit
        run: |
          uv run pre-commit run --all-files --show-diff-on-failure
      - name: Ruff format check
        run: |
          uv run ruff format --check
      - name: Ruff lint
        run: |
          uv run ruff check --output-format=github
      - name: Run tests with coverage
        run: |
          uv run pytest --junitxml=junit-${{ matrix.os }}-py${{ matrix.python-version }}.xml
      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-py${{ matrix.python-version }}
          path: junit-${{ matrix.os }}-py${{ matrix.python-version }}.xml
          if-no-files-found: warn
      - name: Upload coverage data file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.os }}-py${{ matrix.python-version }}
          path: .coverage
          if-no-files-found: warn
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
      - name: Upload HTML coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov-${{ matrix.os }}-py${{ matrix.python-version }}
          path: htmlcov
          if-no-files-found: warn

  coverage-aggregate:
    name: Coverage Aggregate
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Download coverage data artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          path: coverage-data
          merge-multiple: false
      - name: Install dependencies for coverage tooling
        run: |
          uv sync --group dev
      - name: Prepare coverage files
        shell: bash
        run: |
          set -euo pipefail
          i=0
          find coverage-data -type f -name ".coverage" | while read -r f; do
            cp "$f" ".coverage.$i";
            i=$((i+1));
          done
          ls -la .coverage*
      - name: Combine and report coverage
        run: |
          uv run coverage combine
          uv run coverage xml
          uv run coverage html
          uv run coverage report --fail-under=85 | tee -a $GITHUB_STEP_SUMMARY
      - name: Upload combined coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: |
            coverage.xml
            htmlcov
          if-no-files-found: warn
