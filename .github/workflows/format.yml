name: Format and Fix

on:
  workflow_dispatch:
    inputs:
      fix_only:
        description: "Only fix safe issues, don't format"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run ruff check --fix
        if: ${{ !inputs.fix_only }}
        run: uv run --no-sync ruff check --fix nvision tests

      - name: Run ruff format
        if: ${{ !inputs.fix_only }}
        run: uv run --no-sync ruff format nvision tests

      - name: Run ruff check --fix only
        if: ${{ inputs.fix_only }}
        run: uv run --no-sync ruff check --fix nvision tests

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push fixes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-format and fix with ruff"
          git push
